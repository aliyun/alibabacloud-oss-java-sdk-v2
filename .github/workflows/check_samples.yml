name: Check Sample Code Compilation

on:
  push:
    paths:
      - 'samples/**'
      - 'src/**'
      - 'pom.xml'
  pull_request:
    paths:
      - 'samples/**'
      - 'src/**'
      - 'pom.xml'

jobs:
  check-samples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['8', '11', '17', '21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          cache: 'maven'
          java-version: ${{ matrix.java-version }}

      - name: Build main project and install to local Maven repository
        run: |
          mvn -B clean install -DskipTests -Dgpg.skip=true
        working-directory: ${{ github.workspace }}

      - name: Check sample code compilation
        run: |
          mvn -B clean compile
        working-directory: ${{ github.workspace }}/samples

      - name: Summary
        run: echo "All sample code compiled successfully!"
